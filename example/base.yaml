global:
  resolve_timeout: 5m
  opsgenie_api_key: "env(OPSGENIE_API_KEY)"
  slack_api_url: "env(SLACK_API_URL)"

templates:

route:
  receiver: default
  group_by: [alertname, cluster]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts with no team label go to the on-call fallback
    - receiver: oncall-fallback
      matchers:
        - severity="critical"
        - label_team=""
      group_wait: 10s
      repeat_interval: 30m

receivers:
  - name: default
    slack_configs:
      - channel: "#alerts-unrouted"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: "env(JWT_TOKEN_1)"

  - name: oncall-fallback
    slack_configs:
      - channel: "#oncall"
        send_resolved: true
        title: "CRITICAL — no team owner: {{ .CommonAnnotations.summary }}"
    pagerduty_configs:
      - routing_key: "fallback-pd-routing-key"
        send_resolved: true

inhibit_rules:
  # Silence warnings when a critical is firing for the same alert on the same cluster
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - cluster
