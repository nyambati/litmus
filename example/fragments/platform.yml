name: "platform"
namespace: "platform"

group:
  match:
    label_team: "platform"

routes:
  - receiver: "critical"
    match:
      severity: "critical"
    group_by: [alertname, cluster, namespace]
    group_wait: 15s
    repeat_interval: 30m

  - receiver: "warning"
    match:
      severity: "warning"
    group_wait: 3m
    repeat_interval: 2h

receivers:
  - name: "critical"
    slack_configs:
      - channel: "#platform-incidents"
        send_resolved: true
    pagerduty_configs:
      - routing_key: "platform-pd-routing-key"
        send_resolved: true

  - name: "warning"
    slack_configs:
      - channel: "#platform-alerts"
        send_resolved: true
