tests:
  - name: "db critical routes to db-critical and pages on-call"
    alert:
      labels:
        label_team: "database"
        severity: "critical"
        alertname: "PostgresReplicationLag"
        db_instance: "prod-primary-01"
    expect:
      outcome: active
      receivers:
        - db-critical

  - name: "db warning routes to db-warning"
    alert:
      labels:
        label_team: "database"
        severity: "warning"
        alertname: "SlowQueryRate"
    expect:
      outcome: active
      receivers:
        - db-warning

  - name: "db info routes to db-warning"
    alert:
      labels:
        label_team: "database"
        severity: "info"
        alertname: "ConnectionPoolNearLimit"
    expect:
      outcome: active
      receivers:
        - db-warning
