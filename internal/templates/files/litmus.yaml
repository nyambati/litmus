# Litmus Configuration
# See https://github.com/nyambati/litmus for documentation

config:
  directory: config # Alertmanager config directory
  file: alertmanager.yml # Config filename
  templates: templates/ # Templates directory (relative to config.directory)

# Global Test Labels: These labels are automatically added to
# EVERY synthesized alert during the 'snapshot' process.
global_labels:
  severity: "warning"
  cluster: "production"

# Mimir Configuration (optional, used for 'litmus sync')
mimir:
  address: ""
  tenant_id: ""
  api_key: ""

# Regression Settings
regression:
  directory: regressions/ # Baseline directory
  keep: 3

# Behavioral Unit Test (BUT) Settings
tests:
  directory: tests/ # Behavioral tests directory
