# Litmus Configuration
# See https://github.com/nyambati/litmus for documentation

workspace:
  root: "config" # The Root Package directory (contains alertmanager.yml, tests, regressions)
  fragments: "fragments/*" # Discovery pattern for team fragments (relative to root)
  history: 5 # Number of regression baselines to keep

# Global Test Labels: These labels are automatically added to
# EVERY synthesized alert during the 'snapshot' process.
global_labels:

# Policy Configuration (optional, enforced during 'litmus check')
# Applies to both root package and all fragments by default.
# policy:
#   require_tests: true          # Root and every fragment must have at least one test
#   skip_root: false             # Set true to exempt the root package from policy checks
#   enforce:
#     strict: true               # true = AND (all labels required), false = OR (any one label)
#     matchers:                  # Label names that must appear in every route path
#       - team
#       - service

# Sanity Checks (optional, defaults to fail mode for all categories)
# Set specific checks to "warn" if you want them to pass with warnings
# sanity:
#   orphan_receivers: warn       # "warn" or "fail"
#   dead_receivers: warn          # "warn" or "fail"
#   shadowed_routes: warn      # "warn" or "fail"
#   inhibition_cycles: warn    # "warn" or "fail"
#   policy_violations: warn    # "warn" or "fail"

# Mimir Configuration (optional, used for 'litmus sync')
# mimir:
#   address: ""
#   tenant_id: ""
#   api_key: ""
