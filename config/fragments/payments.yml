name: "payments"
namespace: "payments"

group:
  match:
    label_team: "payments"

routes:
  - receiver: "critical"
    match:
      severity: "critical"
    group_by: [alertname, payment_provider, region]
    group_wait: 10s
    repeat_interval: 15m

  - receiver: "warning"
    match:
      severity: "warning"
    group_wait: 2m
    repeat_interval: 1h

inhibit_rules:
  - source_match:
      severity: "critical"
      label_team: "payments"
    target_match:
      severity: "warning"
      label_team: "payments"
    equal:
      - alertname
      - payment_provider

receivers:
  - name: "critical"
    slack_configs:
      - channel: "#payments-p1"
        send_resolved: true
    pagerduty_configs:
      - routing_key: "payments-pd-routing-key"
        send_resolved: true

  - name: "warning"
    slack_configs:
      - channel: "#payments-alerts"
        send_resolved: true
