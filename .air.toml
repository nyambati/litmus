# .air.toml
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/litmus ."
  bin = "./tmp/litmus"
  full_bin = "./tmp/litmus serve --dev"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor", "ui"]
  log = "air.log"
  delay = 1000 # ms
  stop_on_error = true
  kill_delay = 500 # ms

[log]
  time = true

[misc]
  clean_on_exit = true
